app-id: org.freeciv.sdl2
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: freeciv-sdl2
rename-icon: freeciv-client
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --share=network
  - --socket=pulseaudio
  - --filesystem=~/.freeciv:create
modules:
  - shared-modules/SDL2/SDL2_image.json
  - shared-modules/SDL2/SDL2_ttf.json
  - name: freeciv-sdl2
    buildsystem: meson
    no-autogen: true
    config-opts:
      - -Dclients=sdl2
      - -Dfcmp=gtk4
      - -Dtools=[]
    sources:
      - type: archive
        url: "https://sourceforge.net/projects/freeciv/files/Freeciv 3.2/3.2.2/freeciv-3.2.2.tar.xz"
        sha256: ed230084e885d19d82170a8b39e43e3291ec446c37239bf2bee8e11245c88960
      - type: patch
        path: 0001-Mark-flathub-as-the-distributor.patch
      - type: patch
        path: 0002-Rename-gtk4-mp-desktop-file.patch
      - type: patch
        path: 0003-Rename-modpack-installer-icon.patch
